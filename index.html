<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>е“ҒиҙЁйғЁ2026е·ҘдҪңзңӢжқҝ</title>
<style>
:root{
  --primary:#1a3a5c;--primary-light:#2c5f8a;--primary-pale:#e8f0f8;
  --accent:#2e75b6;--accent-pale:#d0e3f5;
  --success:#2d7d46;--success-pale:#d4edda;--success-deep:#1e5631;
  --warning:#d4780a;--warning-pale:#fff3cd;
  --danger:#b91c1c;--danger-pale:#f8d7da;--danger-deep:#7f1d1d;
  --gray-50:#f8f9fa;--gray-100:#f1f3f5;--gray-200:#e9ecef;--gray-300:#dee2e6;
  --gray-500:#868e96;--gray-700:#495057;
  --bg:#f0f2f5;--card:#fff;--text:#2d3436;--text-sec:#636e72;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow:0 2px 12px rgba(0,0,0,.08);
  --transition:all .25s cubic-bezier(.4,0,.2,1);
  --cat-help:#e17055;--cat-tech:#00b894;--cat-support:#6c5ce7;--cat-optim:#0984e3;--cat-dev:#2e75b6;
  /* Bonus category colors */
  --bonus-dev:linear-gradient(135deg,#2e75b6,#1a5490);
  --bonus-newtech:linear-gradient(135deg,#6c5ce7,#5a4bd1);
  --bonus-support:linear-gradient(135deg,#00b894,#00997a);
  --bonus-effect:linear-gradient(135deg,#e17055,#c0513a);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;padding-bottom:70px;-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:0 16px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:50px}
.header h1{font-size:17px;font-weight:600;color:#fff}
.header-right{display:flex;align-items:center;gap:8px}
.header-right span{background:rgba(255,255,255,.18);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px}
.admin-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 10px;border-radius:16px;font-size:11px;cursor:pointer;transition:var(--transition)}
.admin-btn:hover{background:rgba(255,255,255,.25)}
.admin-btn.active{background:var(--success);border-color:var(--success)}
.content{padding:12px 16px;max-width:640px;margin:0 auto}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:12px}
.card-body{padding:16px}

/* ===== HERO CARDS ===== */
.hero{border-radius:var(--radius);padding:20px 18px;margin-bottom:16px;box-shadow:var(--shadow);color:#fff}
.hero-blue{background:linear-gradient(135deg,var(--primary),#1e4a73)}
.hero-green{background:linear-gradient(135deg,#2d6a4f,#40916c)}
.hero-orange{background:linear-gradient(135deg,#d4780a,#b8670a)}
.hero .h-label{font-size:12px;opacity:.7;margin-bottom:2px}
.hero .h-title{font-size:18px;font-weight:700;margin-bottom:6px}
.hero .h-sub{font-size:13px;opacity:.85;line-height:1.5;margin-bottom:14px}
.hero-stats{display:grid;gap:6px}
.hero-stats.c3{grid-template-columns:repeat(3,1fr)}
.hero-stats.c4{grid-template-columns:repeat(4,1fr)}
.hero-stats.c5{grid-template-columns:repeat(5,1fr)}
.hs{text-align:center;padding:10px 4px;background:rgba(255,255,255,.12);border-radius:var(--radius-sm)}
.hs .num{font-size:22px;font-weight:700;line-height:1.1}
.hs .lbl{font-size:10px;opacity:.75;margin-top:2px}

/* ===== SECTION TITLE ===== */
.stitle{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px}
.stitle h2{font-size:15px;font-weight:600;padding-left:10px;position:relative}
.stitle h2::before{content:'';position:absolute;left:0;top:2px;bottom:2px;width:3px;background:var(--accent);border-radius:2px}
.stitle .more{font-size:12px;color:var(--accent);cursor:pointer}

/* ===== MONTH SELECTOR ===== */
.msel{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-bottom:16px}
.msel button{border:1px solid var(--gray-300);background:var(--card);padding:7px 14px;border-radius:20px;font-size:13px;white-space:nowrap;cursor:pointer;transition:var(--transition);font-weight:500}
.msel button.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ===== BADGES ===== */
.badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;display:inline-block}
.b-person{background:var(--accent-pale);color:var(--accent)}
.b-type{background:var(--primary-pale);color:var(--primary-light)}
.b-dl{background:var(--gray-100);color:var(--gray-700)}
.b-risk-high{background:var(--danger-pale);color:var(--danger)}
.b-risk-mid{background:var(--warning-pale);color:var(--warning)}
.b-risk-low{background:var(--success-pale);color:var(--success)}
.b-risk-extreme{background:var(--danger-pale);color:var(--danger-deep);font-weight:700}
.b-done{background:var(--success-pale);color:var(--success)}
.b-doing{background:var(--warning-pale);color:var(--warning)}
.b-todo{background:var(--gray-100);color:var(--gray-500)}
.b-ref{background:var(--accent-pale);color:var(--accent);cursor:pointer}
.b-ref:active{opacity:.7}

/* Status badges for edit mode */
.b-status{cursor:pointer;transition:var(--transition);border:2px solid transparent}
.b-status:hover{border-color:var(--accent);transform:scale(1.05)}
.b-status-0{background:var(--gray-200);color:var(--gray-500)}
.b-status-1{background:var(--warning-pale);color:var(--warning)}
.b-status-2{background:var(--success-pale);color:var(--success)}
.b-status-3{background:var(--accent-pale);color:var(--accent)}
.b-status-4{background:var(--danger-pale);color:var(--danger)}

/* ===== OGSMT VIEW ===== */
.og-big{border-left:4px solid var(--accent);margin-bottom:14px;border-radius:var(--radius);overflow:hidden}
.og-big.e2{border-left-color:var(--warning)}
.og-big-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:var(--primary-pale)}
.og-big-head:active{background:var(--accent-pale)}
.og-big-title{font-size:15px;font-weight:600;color:var(--primary);flex:1;line-height:1.4}
.og-big-meta{font-size:11px;color:var(--text-sec);margin-left:8px;white-space:nowrap}
.og-arrow{color:var(--gray-500);font-size:12px;margin-left:4px;transition:var(--transition)}
.og-arrow.open{transform:rotate(90deg)}

.og-strat{border-top:1px solid var(--gray-100)}
.og-strat-head{padding:11px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:var(--gray-50)}
.og-strat-head:active{background:var(--gray-100)}
.og-strat-name{font-size:13px;font-weight:600;color:var(--primary-light);flex:1;line-height:1.4}
.og-strat-meta{font-size:11px;color:var(--text-sec);margin-left:8px;white-space:nowrap}

.og-act{padding:10px 16px 10px 24px;border-bottom:1px solid var(--gray-100);display:flex;align-items:flex-start;gap:10px}
.og-act:last-child{border-bottom:none}
.og-ck{flex-shrink:0;margin-top:3px}
.og-ck input[type=checkbox]{width:18px;height:18px;accent-color:var(--success);cursor:pointer}
.og-ck input[type=checkbox:disabled]{opacity:.5;cursor:not-allowed}
.og-act-info{flex:1;min-width:0}
.og-act-name{font-size:13px;font-weight:500;line-height:1.4}
.og-act-meta{font-size:11px;color:var(--text-sec);margin-top:3px;display:flex;flex-wrap:wrap;gap:4px 6px;align-items:center}
.og-act-rsk{font-size:11px;color:var(--danger);margin-top:4px;display:flex;align-items:flex-start;gap:4px;line-height:1.4}
.og-act-rsk::before{content:'вҡ ';flex-shrink:0}

/* Monthly refs under action */
.og-monthly-refs{margin-top:6px;padding-top:6px;border-top:1px dashed var(--gray-200)}
.og-mr-title{font-size:11px;color:var(--text-sec);margin-bottom:4px}
.og-mr-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px}
.og-mr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.og-mr-dot.done{background:var(--success)}
.og-mr-dot.doing{background:var(--warning)}
.og-mr-dot.todo{background:var(--gray-300)}

/* ===== RISK SECTION IN OGSMT ===== */
.risk-card{border-left:4px solid var(--danger);margin-bottom:10px;border-radius:var(--radius)}
.risk-card.r-mid{border-left-color:var(--warning)}
.risk-card.r-low{border-left-color:var(--success)}
.risk-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.risk-impact{font-size:12px;color:var(--text-sec);margin:6px 0}
.action-check{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--gray-100)}
.action-check:last-of-type{border-bottom:none}
.action-check input[type=checkbox]{width:18px;height:18px;margin-top:1px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.action-check input[type=checkbox:disabled]{opacity:.5;cursor:not-allowed}
.action-check label{font-size:13px;flex:1;cursor:pointer}
.action-check label.checked{text-decoration:line-through;color:var(--gray-500)}
.claim-row{display:flex;gap:8px;margin-top:6px}
.claim-row input{flex:1;border:1px solid var(--gray-300);border-radius:var(--radius-xs);padding:6px 10px;font-size:12px;font-family:inherit}
.claim-row button{border:none;background:var(--accent);color:#fff;padding:6px 14px;border-radius:var(--radius-xs);font-size:12px;cursor:pointer;font-weight:500}
.claim-row button.saved{background:var(--success)}
.risk-owner{font-size:11px;color:var(--text-sec);margin-top:6px}

/* ===== PERSON LOAD ===== */
.pl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.pl-item{background:var(--card);border-radius:var(--radius-sm);padding:10px 12px;box-shadow:var(--shadow-sm)}
.pl-name{font-size:13px;font-weight:600;margin-bottom:4px}
.pl-bar{display:flex;gap:3px;flex-wrap:wrap}
.pl-dot{width:10px;height:10px;border-radius:50%}
.pl-dot.d-done{background:var(--success)}
.pl-dot.d-doing{background:var(--warning)}
.pl-dot.d-todo{background:var(--gray-300)}
.pl-dot.d-high{background:var(--danger)}
.pl-meta{font-size:11px;color:var(--text-sec);margin-top:3px}

/* ===== MONTHLY VIEW ===== */
.cat-card{margin-bottom:12px;border-left:4px solid var(--accent);border-radius:var(--radius);overflow:hidden}
.cat-card.ck-help{border-left-color:var(--cat-help)}
.cat-card.ck-tech{border-left-color:var(--cat-tech)}
.cat-card.ck-support{border-left-color:var(--cat-support)}
.cat-card.ck-optim{border-left-color:var(--cat-optim)}
.cat-head{padding:12px 16px;background:var(--gray-50);display:flex;justify-content:space-between;align-items:center}
.cat-name{font-size:14px;font-weight:600}
.cat-count{font-size:12px;color:var(--text-sec)}
.cat-item{padding:12px 16px;border-bottom:1px solid var(--gray-100);display:flex;align-items:flex-start;gap:10px}
.cat-item:last-child{border-bottom:none}
.ci-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0;cursor:default}
.ci-dot.done{background:var(--success)}
.ci-dot.doing{background:var(--warning)}
.ci-dot.todo{background:var(--gray-300)}
.ci-dot.ref{background:var(--accent)}
.ci-dot.wait{background:#f0ad4e}
.ci-dot.pause{background:var(--danger)}
.ci-dot.editable{cursor:pointer;border:2px solid var(--gray-500)}
.ci-dot.editable:hover{border-color:var(--accent);transform:scale(1.2)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:500;line-height:1.4}
.ci-result{font-size:12px;color:var(--text-sec);margin-top:2px;line-height:1.4}
.ci-meta{font-size:11px;color:var(--text-sec);margin-top:3px;display:flex;flex-wrap:wrap;gap:3px 6px;align-items:center}

/* ===== BONUS RULES VIEW ===== */
.bonus-hero{border-radius:var(--radius);padding:20px 18px;margin-bottom:16px;box-shadow:var(--shadow);color:#fff;background:linear-gradient(135deg,#1a3a5c,#2c5f8a)}
.bonus-pie{display:flex;align-items:center;gap:16px;margin-top:12px}
.bonus-pie-chart{position:relative;width:100px;height:100px;flex-shrink:0}
.bonus-pie-ring{width:100%;height:100%;border-radius:50%;background:conic-gradient(var(--cat-dev) 0deg 216deg,var(--cat-support) 216deg 288deg,var(--bonus-support) 288deg 360deg);position:relative}
.bonus-pie-inner{position:absolute;top:20%;left:20%;width:60%;height:60%;background:var(--card);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--primary)}
.bonus-legend{flex:1}
.bonus-legend-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px}
.bonus-legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.bonus-legend-dot.dev{background:var(--cat-dev)}
.bonus-legend-dot.newtech{background:var(--cat-support)}
.bonus-legend-dot.support{background:var(--bonus-support)}
.bonus-legend-dot.effect{background:var(--bonus-effect)}
.bonus-legend-amount{font-weight:700;margin-left:auto}

.bonus-category{margin-bottom:12px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.bonus-cat-header{padding:14px 16px;color:#fff;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.bonus-cat-header:active{opacity:.9}
.bonus-cat-header.dev{background:var(--cat-dev)}
.bonus-cat-header.newtech{background:var(--cat-support)}
.bonus-cat-header.support{background:var(--bonus-support)}
.bonus-cat-header.effect{background:var(--bonus-effect)}
.bonus-cat-title{font-size:15px;font-weight:600}
.bonus-cat-meta{font-size:12px;opacity:.8;margin-top:2px}
.bonus-cat-amount{font-size:18px;font-weight:700;text-align:right}
.bonus-cat-amount small{font-size:11px;opacity:.8;display:block}
.bonus-cat-arrow{font-size:16px;margin-left:8px;transition:var(--transition)}
.bonus-cat-arrow.open{transform:rotate(180deg)}

.bonus-cat-body{background:var(--card);padding:12px 16px}
.bonus-sub-item{padding:10px 0;border-bottom:1px solid var(--gray-100)}
.bonus-sub-item:last-child{border-bottom:none}
.bonus-sub-header{display:flex;justify-content:space-between;align-items:center;padding:6px 0;cursor:pointer}
.bonus-sub-header:active{background:var(--gray-50)}
.bonus-sub-name{font-size:13px;font-weight:600;color:var(--text)}
.bonus-sub-amount{font-size:12px;color:var(--accent);font-weight:500}
.bonus-sub-body{padding:8px 0 8px 12px;border-left:2px solid var(--gray-200);margin-left:4px}
.bonus-sub-detail{padding:6px 0;font-size:12px;color:var(--text-sec)}
.bonus-sub-detail-name{font-weight:500;color:var(--text);margin-bottom:2px}

.bonus-progress-item{margin-bottom:10px}
.bonus-progress-header{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.bonus-progress-bar{height:8px;background:var(--gray-200);border-radius:4px;overflow:hidden}
.bonus-progress-fill{height:100%;border-radius:4px;transition:width .6s}

/* Rules & Penalty */
.bonus-rules{margin-top:16px}
.bonus-rules-title{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.bonus-rules-title span{font-size:12px;color:var(--text-sec);font-weight:400}
.bonus-rule-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px dashed var(--gray-200);font-size:12px}
.bonus-rule-item:last-child{border-bottom:none}
.bonus-rule-num{width:18px;height:18px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.bonus-rule-text{flex:1;line-height:1.5}
.bonus-penalty-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px dashed var(--gray-200);font-size:12px}
.bonus-penalty-item:last-child{border-bottom:none}
.bonus-penalty-num{width:18px;height:18px;background:var(--danger);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.bonus-penalty-text{flex:1;line-height:1.5}
.bonus-penalty-arrow{color:var(--danger);font-weight:600}

/* ===== MODAL ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px 32px;width:100%;max-width:480px;animation:slideUp .3s ease;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:17px;font-weight:600;margin-bottom:16px}
.modal label{display:block;font-size:12px;color:var(--text-sec);font-weight:500;margin-bottom:4px;margin-top:14px}
.modal input{width:100%;border:1px solid var(--gray-300);border-radius:var(--radius-xs);padding:10px 12px;font-size:14px;font-family:inherit}
.modal input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-pale)}
.modal select{width:100%;border:1px solid var(--gray-300);border-radius:var(--radius-xs);padding:10px 12px;font-size:14px;font-family:inherit;background:#fff;appearance:none;-webkit-appearance:none}
.modal select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-pale)}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btns button{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;font-weight:500}
.modal-btns .btn-cancel{background:var(--gray-100);color:var(--gray-700)}
.modal-btns .btn-confirm{background:var(--accent);color:#fff}

/* Status picker modal */
.status-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:16px}
.status-option{padding:10px 4px;text-align:center;border-radius:var(--radius-sm);cursor:pointer;border:2px solid transparent;transition:var(--transition)}
.status-option:hover{border-color:var(--accent)}
.status-option.selected{border-color:var(--text);background:var(--gray-50)}
.status-option .so-dot{width:16px;height:16px;border-radius:50%;margin:0 auto 4px}
.status-option .so-label{font-size:11px;font-weight:500}

/* Admin config panel */
.admin-config-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.admin-config-title{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--primary)}
.admin-config-row{margin-bottom:14px}
.admin-config-row label{font-size:12px;color:var(--text-sec);margin-bottom:4px;display:block}
.admin-config-row input{width:100%;border:1px solid var(--gray-300);border-radius:var(--radius-xs);padding:10px 12px;font-size:14px}
.admin-config-row input:focus{border-color:var(--accent);outline:none}
.admin-config-hint{font-size:11px;color:var(--text-sec);margin-top:4px;line-height:1.4}
.admin-config-save{display:flex;gap:10px;margin-top:16px}
.admin-config-save button{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;font-weight:500}
.admin-config-save .btn-save{background:var(--success);color:#fff}
.admin-config-save .btn-test{background:var(--accent);color:#fff}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;animation:fadeInUp .3s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ===== BOTTOM NAV ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;border-top:1px solid var(--gray-200);z-index:100;box-shadow:0 -1px 8px rgba(0,0,0,.06);padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav button{flex:1;border:none;background:none;padding:8px 4px;font-size:10px;color:var(--gray-500);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:var(--transition);position:relative}
.bottom-nav button.active{color:var(--accent)}
.bottom-nav button.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--accent);border-radius:0 0 2px 2px}
.bottom-nav .nav-icon{font-size:20px;line-height:1}
.bottom-nav .nav-badge{position:absolute;top:2px;right:20%;background:var(--danger);color:#fff;width:14px;height:14px;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center}

/* ===== UTILS ===== */

    }

async function testGitHubConnection() {
  const { owner, repo, token, branch } = githubConfig;
  if (!owner || !repo) return { success: false, message: 'иҜ·еЎ«еҶҷз”ЁжҲ·еҗҚе’Ңд»“еә“еҗҚ' };
  
  try {
    const resp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.json?ref=${branch}`, {
      headers: token ? { Authorization: `token ${token}` } : {}
    });
    if (resp.ok) {
      return { success: true, message: 'иҝһжҺҘжҲҗеҠҹпјҒеҸҜд»ҘиҜ»еҸ–ж•°жҚ®' };
    } else if (resp.status === 404) {
      return { success: true, message: 'д»“еә“еӯҳеңЁпјҢдҪҶdata.jsonдёҚеӯҳеңЁпјҢе°ҶдҪҝз”Ёй»ҳи®Өж•°жҚ®' };
    } else {
      return { success: false, message: `иҝһжҺҘеӨұиҙҘ: ${resp.status} ${resp.statusText}` };
    }
  } catch (e) {
    return { success: false, message: 'зҪ‘з»ңй”ҷиҜҜ: ' + e.message };
  }
}

async function fetchDataFromGitHub() {
  const { owner, repo, branch } = githubConfig;
  if (!owner || !repo) return null;
  
  try {
    const url = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/data.json?t=${Date.now()}`;
    const resp = await fetch(url);
    if (resp.ok) {
      const data = await resp.json();
      return data;
    }
  } catch (e) {
    console.warn('GitHub fetch failed:', e);
  }
  return null;
}

async function saveDataToGitHub(data) {
  const { owner, repo, token, branch } = githubConfig;
  if (!owner || !repo || !token) return { success: false, message: 'жңӘй…ҚзҪ®GitHubжҲ–зјәе°‘Token' };
  
  try {
    // Get file SHA
    const getResp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.json?ref=${branch}`, {
      headers: { Authorization: `token ${token}` }
    });
    
    let sha = null;
    if (getResp.ok) {
      const fileData = await getResp.json();
      sha = fileData.sha;
    } else if (getResp.status !== 404) {
      return { success: false, message: `иҺ·еҸ–SHAеӨұиҙҘ: ${getResp.status}` };
    }
    
    // Write file
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const body = {
      message: `жӣҙж–°е·ҘдҪңзңӢжқҝж•°жҚ® ${new Date().toISOString()}`,
      content: content,
      branch: branch
    };
    if (sha) body.sha = sha;
    
    const putResp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.json`, {
      method: 'PUT',
      headers: {
        Authorization: `token ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    
    if (putResp.ok) {
      return { success: true, message: 'дҝқеӯҳжҲҗеҠҹ' };
    } else {
      const err = await putResp.json();
      return { success: false, message: err.message || 'дҝқеӯҳеӨұиҙҘ' };
    }
  } catch (e) {
    return { success: false, message: 'дҝқеӯҳеӨұиҙҘ: ' + e.message };
  }
}

  await loadGitHubConfig();
  
  // Check if admin mode should be enabled
  isAdminMode = githubConfig.owner && githubConfig.repo && githubConfig.token;
  updateAdminButton();
  
  // Try to load from GitHub
  const githubData = await fetchDataFromGitHub();
  if (githubData) {
    DATA = deepMerge(DEFAULT_DATA, githubData);
    selectedMonth = DATA.currentMonth;
    showToast('е·Ід»ҺGitHubеҠ иҪҪжңҖж–°ж•°жҚ®');
  }
  
  hideLoading();
  render();
}

function deepMerge(target, source) {
  const result = { ...target };
  for (const key in source) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
      result[key] = deepMerge(target[key] || {}, source[key]);
    } else {
      result[key] = source[key];
    }
  }
  return result;
}

// ==================== ADMIN MODE ====================
function toggleAdminMode() {
  if (!githubConfig.owner || !githubConfig.repo) {
    // Need to configure first
    openAdminModal();
    return;
  }
  
  if (!githubConfig.token) {
    showToast('иҜ·е…Ҳй…ҚзҪ®GitHub PATжүҚиғҪдҪҝз”Ёз®ЎзҗҶжЁЎејҸ');
    openAdminModal();
    return;
  }
  
  isAdminMode = !isAdminMode;
  updateAdminButton();
  render();
  showToast(isAdminMode ? 'е·Іиҝӣе…Ҙз®ЎзҗҶжЁЎејҸ' : 'е·ІйҖҖеҮәз®ЎзҗҶжЁЎејҸ');
}

function updateAdminButton() {
  const btn = document.getElementById('adminBtn');
  if (isAdminMode) {
    btn.classList.add('active');
    btn.textContent = 'йҖҖеҮәз®ЎзҗҶ';
  } else {
    btn.classList.remove('active');
    btn.textContent = 'з®ЎзҗҶжЁЎејҸ';
  }
}

function openAdminModal() {
  document.getElementById('cfgOwner').value = githubConfig.owner || '';
  document.getElementById('cfgRepo').value = githubConfig.repo || '';
  document.getElementById('cfgBranch').value = githubConfig.branch || 'main';
  document.getElementById('cfgToken').value = githubConfig.token || '';
  document.getElementById('adminConfigStatus').textContent = '';
  document.getElementById('adminModal').classList.add('show');
}

function closeAdminModal() {
  document.getElementById('adminModal').classList.remove('show');
}

async function testGitHubConfig() {
  const owner = document.getElementById('cfgOwner').value.trim();
  const repo = document.getElementById('cfgRepo').value.trim();
  const branch = document.getElementById('cfgBranch').value.trim() || 'main';
  const token = document.getElementById('cfgToken').value.trim();
  
  const tempConfig = { owner, repo, branch, token };
  const original = { ...githubConfig };
  Object.assign(githubConfig, tempConfig);
  
  document.getElementById('adminConfigStatus').innerHTML = '<span style="color:var(--accent)">жөӢиҜ•дёӯ...</span>';
  
  const result = await testGitHubConnection();
  
  document.getElementById('adminConfigStatus').innerHTML = result.success 
    ? '<span style="color:var(--success)">' + result.message + '</span>'
    : '<span style="color:var(--danger)">' + result.message + '</span>';
  
  if (!result.success) {
    Object.assign(githubConfig, original);
  }
}

async function saveGitHubConfig() {
  githubConfig.owner = document.getElementById('cfgOwner').value.trim();
  githubConfig.repo = document.getElementById('cfgRepo').value.trim();
  githubConfig.branch = document.getElementById('cfgBranch').value.trim() || 'main';
  githubConfig.token = document.getElementById('cfgToken').value.trim();
  
  await saveGitHubConfigToStorage();
  
  closeAdminModal();
  
  isAdminMode = githubConfig.token ? true : isAdminMode;
  updateAdminButton();
  
  showToast('й…ҚзҪ®е·Ідҝқеӯҳ');
  render();
}

// ==================== BUILD INDEX ====================
function buildMonthlyIndex() {
  const idx = {};
  Object.entries(DATA.months).forEach(([mk, md]) => {
    md.works.forEach(cat => {
      cat.items.forEach(item => {
        if (item.ref) {
          if (!idx[item.ref]) idx[item.ref] = [];
          idx[item.ref].push({ month: mk, monthLabel: md.label, catKey: cat.catKey, desc: item.desc, status: item.status, result: item.result, person: item.person, time: item.time });
        }
      });
    });
  });
  return idx;
}
const monthlyIdx = buildMonthlyIndex();

function findAction(aid) {
  for (const big of DATA.ogsmt) {
    for (const strat of big.strategies) {
      for (const act of strat.actions) {
        if (act.id === aid) return { big, strat, act };
      }
    }
  }
  return null;
}

function getOGPath(aid) {
  const f = findAction(aid);
  if (!f) return '';
  return f.big.title + ' вҖә ' + f.strat.name + ' вҖә ' + f.act.name;
}

// ==================== NAVIGATION ====================
function navTo(tab) {
  currentTab = tab;
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
  if (jumpTarget) {
    setTimeout(() => {
      const el = document.getElementById('act_' + jumpTarget);
      if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.style.background = 'var(--accent-pale)'; setTimeout(() => el.style.background = '', 1500) }
      jumpTarget = null;
    }, 100);
  }
}

function toggleExpand(key) {
  expandState[key] = !expandState[key];
  render();
}

function jumpToAction(aid) {
  const f = findAction(aid);
  if (!f) return;
  expandState[f.big.id] = true;
  expandState[f.big.id + '_' + f.strat.id] = true;
  jumpTarget = aid;
  navTo('ogsmt');
}

function render() {
  const d = DATA.months[selectedMonth];
  document.getElementById('monthTag').textContent = d ? d.label : '';
  if (currentTab === 'ogsmt') renderOGSMT();
  else if (currentTab === 'monthly') renderMonthly(d);
  else if (currentTab === 'bonus') renderBonus();
}

async function toggleOGCheck(actId, checked) {
  // Save locally first
  setOGCK(actId, checked);
  
  // Update checked items for GitHub sync
  const checkedItems = getLocalCheckedItems();
  checkedItems[actId] = checked;
  setLocalCheckedItems(checkedItems);
  
  // Sync to GitHub if admin mode
  if (isAdminMode) {
    await saveDataToGitHub(DATA);
  }
  
  // Update UI
  render();
}

function toggleRiskCK(r, i, el) {
  setRiskCK(r, i, el.checked);
  el.nextElementSibling.classList.toggle('checked', el.checked);
}

function saveRiskCL(r, btn) {
  setRiskCL(r, document.getElementById('rcl_' + r).value);
  btn.textContent = 'е·Ідҝқеӯҳ'; btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'дҝқеӯҳ'; btn.classList.remove('saved') }, 1500);
}

          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  
  // Claims (compact)
  const base = d.claims || [];
  const extra = getExtraClaims().filter(c => c.month === selectedMonth);
  const all = [...base, ...extra];
  if (all.length) {
    html += `<div class="stitle"><h2>д»»еҠЎи®ӨйўҶ</h2>${isAdminMode ? `<button class="btn-export" onclick="openModal()" style="font-size:12px;padding:4px 12px">+ ж–°еўһ</button>` : ''}</div>`;

      const od = c.deadline && new Date(c.deadline) < new Date();
      html += `<div class="card"><div class="card-body" style="padding:12px 16px">

        </div>
        ${isAdminMode ? `<div style="display:flex;gap:6px;margin-top:6px">
          ${!c.claimer ? `<button class="ki-btn btn-claim" style="border:none;background:var(--accent);color:#fff;padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer" onclick="claimIt('${c.id}')">и®ӨйўҶ</button>` : ''}
          ${c.claimer && c.status !== 'done' ? `<button class="ki-btn btn-complete" style="border:none;background:var(--success);color:#fff;padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer" onclick="completeIt('${c.id}')">зЎ®и®Өе®ҢжҲҗ</button>` : ''}
        </div>` : ''}
      </div></div>`;
    });
    html += `<div style="font-size:11px;color:var(--text-sec);margin-top:8px;padding:0 4px;line-height:1.5">иҜҙжҳҺпјҡеҰӮеҜ№д»ҘдёҠжҸҸиҝ°жңүз–‘й—®жҲ–иҖ…еҒҸе·®д№ӢеӨ„пјҢж¬ўиҝҺйҡҸж—¶еҸҚйҰҲжҢҮжӯЈгҖӮ</div>`;
  }
  
  html += `<button class="btn-export" onclick="exportMonthlyCSV()" style="margin-top:4px">еҜјеҮәжң¬жңҲж•°жҚ® (CSV)</button>`;
  html += `</div>`;
  document.getElementById('main').innerHTML = html;
}

// ==================== STATUS EDITING ====================
function openStatusModal(monthKey, catIdx, itemIdx) {
  pendingStatusChange = { monthKey, catIdx, itemIdx };
  
  const month = DATA.months[monthKey];
  const item = month.works[catIdx].items[itemIdx];
  const currentStatus = STATUS_KEY_MAP[item.status] || 0;
  
  document.getElementById('statusModalTitle').textContent = 'дҝ®ж”№зҠ¶жҖҒ';
  
  let pickerHtml = '';
  for (let i = 0; i < 5; i++) {
    const s = STATUS_MAP[i];
    pickerHtml += `<div class="status-option ${i === currentStatus ? 'selected' : ''}" onclick="selectStatus(${i})">
      <div class="so-dot" style="background:${s.color}"></div>
      <div class="so-label">${s.label}</div>
    </div>`;
  }
  document.getElementById('statusPicker').innerHTML = pickerHtml;
  
  document.getElementById('statusModal').classList.add('show');
}

function selectStatus(idx) {
  document.querySelectorAll('.status-option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
}

function closeStatusModal() {
  document.getElementById('statusModal').classList.remove('show');
  pendingStatusChange = null;
}

async function confirmStatusChange() {
  if (!pendingStatusChange) return;
  
  const selected = document.querySelector('.status-option.selected');
  if (!selected) return;
  
  const idx = [...document.querySelectorAll('.status-option')].indexOf(selected);
  const statusNames = ['todo', 'doing', 'done', 'ref', 'pause'];
  
  const { monthKey, catIdx, itemIdx } = pendingStatusChange;
  DATA.months[monthKey].works[catIdx].items[itemIdx].status = statusNames[idx];
  
  closeStatusModal();
  
  // Save to GitHub
  if (isAdminMode) {
    showLoading('дҝқеӯҳдёӯ...');
    const result = await saveDataToGitHub(DATA);
    hideLoading();
    showToast(result.success ? 'дҝқеӯҳжҲҗеҠҹ' : 'дҝқеӯҳеӨұиҙҘ: ' + result.message);
  }
  
  render();
}

function exportMonthlyCSV() {
  const d = DATA.months[selectedMonth]; if (!d) return;
  let csv = '\uFEFFе·ҘдҪңеҲҶзұ»,д»»еҠЎжҸҸиҝ°,дәӨд»ҳжҲҗжһң,зҠ¶жҖҒ,жү§иЎҢдәә,ж—¶й—ҙ,е…іиҒ”OGSMT\n';
  d.works.forEach(cat => {
    cat.items.forEach(item => {
      const st = STATUS_MAP[STATUS_KEY_MAP[item.status] || 0]?.label || item.status;
      const ogPath = item.ref ? getOGPath(item.ref) : '';
      csv += `"${cat.category}","${item.desc}","${item.result}","${st}","${item.person}","${item.time || ''}","${ogPath}"\n`;
    });
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `е“ҒиҙЁйғЁ${d.label}е·ҘдҪңжұҮжҖ».csv`; a.click(); URL.revokeObjectURL(url);
}

// ===== CLAIMS =====
function openModal() { document.getElementById('modal').classList.add('show') }
function closeModal() { document.getElementById('modal').classList.remove('show') }

async function addTask() {
  const desc = document.getElementById('mDesc').value.trim();
  const std = document.getElementById('mStd').value.trim();
  const dl = document.getElementById('mDl').value;
  if (!desc) { alert('иҜ·еЎ«еҶҷд»»еҠЎжҸҸиҝ°'); return }
  const extra = getExtraClaims();
  extra.push({ id: 'cx_' + Date.now(), desc, std, deadline: dl || '', claimDate: new Date().toISOString().slice(0, 10), status: 'unclaimed', claimer: '', delivery: '', month: selectedMonth });
  setExtraClaims(extra);
  closeModal();
  document.getElementById('mDesc').value = ''; document.getElementById('mStd').value = ''; document.getElementById('mDl').value = '';
  
  // Save to GitHub
  if (isAdminMode) {
    await saveDataToGitHub(DATA);
  }
  
  render();
}

async function claimIt(id) {
  const name = prompt('иҜ·иҫ“е…Ҙи®ӨйўҶдәәе§“еҗҚпјҡ'); if (!name) return;
  const d = DATA.months[selectedMonth];
  const base = (d.claims || []).find(c => c.id === id);
  if (base) { base.claimer = name; base.status = 'doing' }
  else { const extra = getExtraClaims(); const item = extra.find(c => c.id === id); if (item) { item.claimer = name; item.status = 'doing' } setExtraClaims(extra) }
  
  if (isAdminMode) await saveDataToGitHub(DATA);
  render();
}

async function completeIt(id) {
  if (!confirm('зЎ®и®ӨиҜҘд»»еҠЎе·Іе®ҢжҲҗпјҹ')) return;
  const d = DATA.months[selectedMonth];
  const base = (d.claims || []).find(c => c.id === id);
  if (base) { base.status = 'done' }
  else { const extra = getExtraClaims(); const item = extra.find(c => c.id === id); if (item) item.status = 'done'; setExtraClaims(extra) }
  
  if (isAdminMode) await saveDataToGitHub(DATA);
  render();
}

// ==================== UTILS ====================
function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'еҠ иҪҪдёӯ...';
  document.getElementById('loadingOverlay').style.display = 'flex';
}

function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}
